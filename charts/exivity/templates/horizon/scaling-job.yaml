apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: {{ include "exivity.fullname" $ }}-horizon
  labels:
    app: {{ include "exivity.fullname" $ }}
    app.kubernetes.io/component: horizon
    {{- include "exivity.labels" $ | indent 4 }}
  annotations:
    checksum/{{- include "exivity.fullname" $ }}-config-horizon: {{ include (print $.Template.BasePath "/horizon/configmap.yaml") . | sha256sum }}
    checksum/{{- include "exivity.fullname" $ }}-rabbitmq-credentials: {{ include (print $.Template.BasePath "/rabbitmq/secret.yaml") . | sha256sum }}
    checksum/{{- include "exivity.fullname" $ }}-keda-trigger-auth-rabbitmq-conn: {{ include (print $.Template.BasePath "/keda/rabbitmq-authentication.yml") . | sha256sum }}
spec:
  jobTargetRef:
    parallelism: 1
    completions: 1
    activeDeadlineSeconds: 90000 # 25 hours
    backoffLimit: 1
    template:
      metadata:
        labels:
          app: {{ include "exivity.fullname" $ }}
          app.kubernetes.io/component: horizon
          {{- include "exivity.labels" $ | indent 10 }}
      spec:
        volumes:
          - name: config
            configMap:
              name: {{ include "exivity.fullname" $ -}}-config-horizon
          - name: log
            persistentVolumeClaim:
              claimName: {{ include "exivity.fullname" $ -}}-horizon-log
        containers:
          - name: horizon
            image: {{ include "exivity.image" (set $ "name" "horizon") }}
            imagePullPolicy: {{ .Values.service.horizon.pullPolicy | default .Values.service.pullPolicy | default "IfNotPresent" }}
            env:
              - name: EXIVITY_BACKEND_LOG_LEVEL
                value: "{{ .Values.logLevel.backend }}"
              - name: LOG_LEVEL
                value: "{{ .Values.logLevel.backend }}"
              - name: PUSHGATEWAY_URL
                value: {{ .Values.betaFeatures.monitoring.prometheusPushGatewayURL | quote }}
              - name: PUSHGATEWAY_JOB_NAME
                value: horizon
            envFrom:
              - secretRef:
                  name: {{ include "exivity.fullname" $ }}-rabbitmq-credentials
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
            volumeMounts:
              - name:      config
                mountPath: /exivity/home/system
              - name:      log
                mountPath: /exivity/home/log/horizon
              - name:      log
                mountPath: /exivity/home/log/merlin
            ports:
              - containerPort: 2112
            livenessProbe:
              httpGet:
                path: /healthz
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
        {{- with .Values.service.pullSecrets }}
        imagePullSecrets:
          {{- range $name := .}}
          - name: {{ $name }}
          {{- end }}
        {{- end }}
        {{- if .Values.service.horizon.nodeName }}
        nodeName: {{ .Values.service.horizon.nodeName }}
        {{- end }}
        {{- with .Values.service.horizon.nodeSelector }}
        nodeSelector:
          {{ range $key, $val := . }}
          {{ $key }}: {{ $val }}
          {{- end }}
        {{- end }}
{{ include "exivity.scalingJobSpec" (dict "values" $ "queueName" "BUDGET") | indent 2 }}
