{{ if .Values.service.tristan.enable }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "exivity.fullname" $ -}}-tristan-metrics
  labels:
    app.kubernetes.io/component: tristan-metrics
    {{- include "exivity.labels" $ | indent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 2112
      targetPort: 2112
      protocol: TCP
      name: metrics
  selector:
    app.kubernetes.io/component: tristan
    {{- include "exivity.matchLabels" $ | indent 4 }}
{{ end }}
