{{ if .Values.service.tristan.enable }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "exivity.fullname" $ -}}-tristan
  labels:
    app.kubernetes.io/component: tristan
    {{- include "exivity.labels" $ | indent 4 }}
spec:
  ports:
    - name: grpc
      port: 50052
      targetPort: 50052
      protocol: TCP
    - name: metrics
      port: 2112
      targetPort: 2112
      protocol: TCP
  selector:
    app.kubernetes.io/component: tristan
    {{- include "exivity.matchLabels" $ | indent 4 }}
{{ end }}
