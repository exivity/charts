# Best-practice starting values for a multi-node, single-site HA deployment.
# This file assumes PostgreSQL is deployed separately and RabbitMQ runs
# site-local in the same Kubernetes cluster.
# Replace all placeholder values before production use.

licence: "your-production-license"

secret:
  # Random values are generated on installation if not set.
  # Specify stable values for production so secrets do not change unexpectedly
  # during reinstall or disaster recovery scenarios.
  appKey: ""
  jwtSecret: ""

ingress:
  enabled: true
  host: exivity.example.com
  ingressClassName: nginx
  trustedProxy: ""
  tls:
    enabled: true
    secret: "exivity-tls"
  annotations:
    kubernetes.io/ingress.allow-http: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

storage:
  # Preferred for HA deployments when available in your environment.
  # Configure the Longhorn StorageClass with three replicas per volume.
  storageClass: "longhorn"
  sharedVolumeAccessMode: ReadWriteMany
  pvcSizes:
    log:
      chronos: 10Gi
      edify: 10Gi
      executor: 10Gi
      glass: 10Gi
      griffon: 10Gi
      horizon: 10Gi
      pigeon: 10Gi
      proximityApi: 10Gi
      proximityCli: 10Gi
      transcript: 10Gi
      use: 10Gi
    config:
      etl: 1Gi
      griffon: 1Gi
      chronos: 1Gi
    data:
      exported: 100Gi
      extracted: 100Gi
      import: 20Gi
      report: 20Gi

postgresql:
  enabled: false
  global:
    postgresql:
      auth:
        database: exivity
        username: exivity
        password: "replace-with-postgresql-password"
        # Not required when using an external database.
        postgresPassword: ""
  # Recommended self-hosted option: CloudNativePG with a 50Gi instance volume.
  host: "exivity-rw.postgresql.svc.cluster.local"
  port: 5432
  sslmode: "require"

rabbitmq:
  # The embedded RabbitMQ dependency is the Bitnami RabbitMQ chart, which now
  # ships through the unsupported bitnamilegacy registry following the Bitnami
  # container catalog changes on 2025-09-29. For production multi-node
  # deployments, run RabbitMQ outside the Exivity chart and connect to it as an
  # external service. The recommended option is the RabbitMQ Cluster Operator
  # (https://www.rabbitmq.com/kubernetes/operator/operator-overview), or a
  # managed RabbitMQ provided by your platform.
  enabled: false
  auth:
    username: user
    password: "replace-with-rabbitmq-password"
  # Connection values for the external RabbitMQ deployment used by Exivity.
  host: "exivity.rabbitmq.svc.cluster.local"
  port: 5672
  vhost: "/"
  secure: false

service:
  glass:
    replicas: 2
  proximityApi:
    replicas: 2
  edify:
    replicas: 2
  horizon:
    replicas: 2
  pigeon:
    replicas: 2
  # Keep workflow and ETL-style services singleton unless Exivity confirms
  # the desired scaling pattern for your workload.
  chronos:
    replicas: 1
  executor:
    replicas: 1
  griffon:
    replicas: 1
  proximityCli:
    replicas: 1
  transcript:
    replicas: 1
  use:
    replicas: 1

logfiles:
  deleteDays: 90
  compressDays: 14

prometheus:
  metricServer:
    enabled: true
    serviceMonitor:
      enabled: true
